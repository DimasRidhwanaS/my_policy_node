# attempt1_config.yaml
# Configuration for Attempt1 policy testing
# All distances in meters, pixels in px

# ─────────────────────────────────────────────
# YOLO MODEL
# ─────────────────────────────────────────────
yolo:
  model_path: "a_image_processing/best.pt"
  confidence_threshold: 0.5

  # Class names from trained model (Roboflow dataset)
  classes:
    task_board: "task_board"
    sfp_port: "sfp_port"
    sfp_port_hole: "sfp_port_hole"
    sc_port: "sc_port"
    sc_port_hole: "sc_port_hole"

# ─────────────────────────────────────────────
# PHASE 1: PORT SEARCH (circle to find port)
# ─────────────────────────────────────────────
port_search:
  # Starting position
  start_x: 0.0
  start_y: 0.0
  search_height: 0.5    # height above table

  # Circular search
  yaw_step_deg: 30.0    # rotate 30° per step

  # Centering
  center_threshold_px: 50
  xy_correction_step_m: 0.02

  # YOLO config
  yolo:
    model_path: "a_image_processing/best.pt"
    confidence_threshold: 0.5
    classes:
      task_board: "task_board"
      sfp_port: "sfp_port"
      sfp_port_hole: "sfp_port_hole"
      sc_port: "sc_port"
      sc_port_hole: "sc_port_hole"

# ─────────────────────────────────────────────
# PHASE 2: EDGE DETECTOR
# ─────────────────────────────────────────────
edge_detector:
  distance_threshold_px: 10    # pixel alignment threshold
  xy_correction_step_m: 0.005  # very fine 5mm corrections
  yolo:                        # YOLO fallback if edge detection fails
    model_path: "a_image_processing/best.pt"
    confidence_threshold: 0.5
    classes:
      sfp_port_hole: "sfp_port_hole"
      sc_port_hole: "sc_port_hole"

# ─────────────────────────────────────────────
# PHASE 3: INSERTER
# ─────────────────────────────────────────────
inserter:
  z_step_m: 0.005              # 5mm per insertion step
  max_force_n: 10.0            # safety force limit
  timeout_sec: 30.0            # give up after this long